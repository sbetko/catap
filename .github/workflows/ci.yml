name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    name: Quality (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Type check
        run: uv run --group dev ty check --error-on-warning src tests

      - name: Test
        run: uv run --group dev pytest

  free-threaded:
    name: Free-threaded (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
        python-version: ["3.13t", "3.14t"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install free-threaded Python
        run: uv python install ${{ matrix.python-version }}

      - name: Verify GIL remains disabled after imports
        run: |
          uv run --python ${{ matrix.python-version }} --group dev python - <<'PY'
          import sys
          import sysconfig

          assert sysconfig.get_config_var("Py_GIL_DISABLED") == 1
          assert sys._is_gil_enabled() is False

          import catap
          import catap.recorder

          assert sys._is_gil_enabled() is False
          PY

      - name: Test
        run: uv run --python ${{ matrix.python-version }} --group dev pytest

  package:
    name: Build Package
    runs-on: macos-26
    needs: [quality, free-threaded]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build distributions
        run: uv run --group dev python -m build

      - name: Verify metadata
        run: uv run --group dev twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
