[project]
name = "catap"
version = "0.1.0"
description = "Python wrapper for Apple's Core Audio Tap API"
readme = "README.md"
authors = [
    { name = "Sage Betko", email = "sage.betko@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pyobjc-core>=11.0",
    "pyobjc-framework-Cocoa>=11.0",
    "pyobjc-framework-CoreAudio>=11.0",
    "click>=8.0",
]

[project.scripts]
catap = "catap.cli:main"

[build-system]
requires = ["uv_build>=0.9.18,<0.10.0"]
build-backend = "uv_build"
